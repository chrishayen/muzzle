name: Publish Docker Images

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build and push ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: real
            dockerfile: Dockerfile
            build_args: |
              INSTALL_REAL=1
              INSTALL_TEST=0
              PYTORCH_INDEX_URL=https://download.pytorch.org/whl/cpu
              TORCH_VERSION=2.11.0
              TORCHAUDIO_VERSION=2.11.0
            tags: |
              type=raw,value=latest,enable={{is_default_branch}}
              type=ref,event=branch
              type=ref,event=tag
              type=sha,prefix=sha-
          - variant: cpu
            dockerfile: Dockerfile
            build_args: |
              INSTALL_REAL=1
              INSTALL_TEST=0
              PYTORCH_INDEX_URL=https://download.pytorch.org/whl/cpu
              TORCH_VERSION=2.11.0
              TORCHAUDIO_VERSION=2.11.0
            tags: |
              type=raw,value=cpu,enable={{is_default_branch}}
              type=ref,event=branch,prefix=cpu-
              type=ref,event=tag,prefix=cpu-
              type=sha,prefix=cpu-sha-
          - variant: cu128
            dockerfile: Dockerfile.cu128
            build_args: |
              CUDA_BASE_IMAGE=nvidia/cuda:12.8.1-cudnn-runtime-ubuntu24.04
              PYTORCH_INDEX_URL=https://download.pytorch.org/whl/cu128
              TORCH_VERSION=2.11.0
              TORCHAUDIO_VERSION=2.11.0
            tags: |
              type=raw,value=cu128,enable={{is_default_branch}}
              type=ref,event=branch,prefix=cu128-
              type=ref,event=tag,prefix=cu128-
              type=sha,prefix=cu128-sha-
          - variant: cu130
            dockerfile: Dockerfile.cu130
            build_args: |
              CUDA_BASE_IMAGE=nvidia/cuda:13.0.3-cudnn-runtime-ubuntu24.04
              PYTORCH_INDEX_URL=https://download.pytorch.org/whl/cu130
              TORCH_VERSION=2.11.0
              TORCHAUDIO_VERSION=2.11.0
            tags: |
              type=raw,value=cu130,enable={{is_default_branch}}
              type=ref,event=branch,prefix=cu130-
              type=ref,event=tag,prefix=cu130-
              type=sha,prefix=cu130-sha-

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ matrix.tags }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
